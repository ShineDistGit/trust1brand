<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black; /* fills empty space around video */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* keeps full video visible */
    }
  </style>
</head>
<body>
  <!-- Replace 'comingsoon.mp4' with your actual video file -->
  <video autoplay muted loop>
    <source src="comingsoon.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</body>
</html>
